<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>廣修企業 · GPS 定位打卡</title>
<style>
  :root{--navy:#13314f;--navy2:#1d4870;--accent:#e8772e;--accent2:#f0913f;
    --bg:#eef2f6;--ink:#1b2733;--muted:#647284;--line:#dde4ea;--ok:#2f9e6f;--bad:#c0492b;--warn:#d4892a;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"Noto Sans TC","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding-bottom:40px}
  .top{background:var(--navy);color:#fff;padding:16px 18px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px}
  .top .lg{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;font-weight:900}
  .top b{font-size:17px;font-weight:800}
  .top .r{margin-left:auto;display:flex;gap:12px;align-items:center}
  .top .r a,.top .r span{color:#bcd0e2;font-size:13px;font-weight:700;cursor:pointer}
  .box{max-width:520px;margin:0 auto;padding:16px}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px}
  label{font-size:13px;font-weight:700;color:var(--muted);display:block;margin-bottom:6px}
  input,select{width:100%;padding:13px;border:1px solid var(--line);border-radius:9px;font-size:16px;font-family:inherit;margin-bottom:12px;background:#fff}
  .pbtn{width:100%;padding:14px;border:0;border-radius:10px;background:var(--navy);color:#fff;font-weight:800;font-size:16px;cursor:pointer;font-family:inherit}
  .err{color:var(--bad);font-size:13.5px;min-height:18px;margin-bottom:6px}
  .status{text-align:center;padding:6px 0 2px}
  .ring{width:118px;height:118px;border-radius:50%;margin:6px auto 12px;display:grid;place-items:center;border:7px solid var(--line);transition:.3s}
  .ring.ok{border-color:var(--ok)} .ring.bad{border-color:var(--bad)} .ring.wait{border-color:var(--warn)}
  .ring b{font-size:15px;font-weight:800}
  .ring.ok b{color:var(--ok)} .ring.bad b{color:var(--bad)} .ring.wait b{color:var(--warn)}
  .loc{font-size:14px;color:var(--muted);margin-bottom:3px}.loc b{color:var(--ink)}
  .acc{font-size:12px;color:var(--muted)}
  .maplink{display:inline-block;margin-top:8px;color:var(--navy2);font-weight:700;font-size:13.5px;text-decoration:underline}
  .relocate{display:block;margin:12px auto 0;color:var(--navy2);font-weight:700;font-size:13.5px;border:1px solid var(--line);padding:7px 14px;border-radius:20px;background:#f6f9fb;cursor:pointer;width:fit-content}
  .btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .btns button{padding:18px 0;border:0;border-radius:12px;font-size:18px;font-weight:800;color:#fff;font-family:inherit;cursor:pointer}
  .bin{background:var(--ok)} .bout{background:var(--navy)}
  .btns button:disabled{opacity:.45}
  .me{text-align:center;font-size:15px;font-weight:800;color:var(--navy);margin-bottom:2px}
  .siteLabel{font-size:13px;font-weight:700;color:var(--muted);margin:6px 0 6px}
  h4{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:10px}
  .rec{padding:11px 0;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .rec:last-child{border-bottom:0}.rec .t{font-weight:800;width:50px}.rec .ty{font-weight:700}
  .rec .ty.in{color:var(--ok)} .rec .ty.out{color:var(--navy2)}
  .rec .sn{color:var(--muted);font-size:13px}
  .rec a{margin-left:auto;font-size:12.5px;font-weight:700;padding:4px 10px;border-radius:16px;border:1px solid var(--line);color:var(--navy2);background:#f6f9fb}
  .empty{color:var(--muted);font-size:13.5px;text-align:center;padding:8px}
  .srow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .srow:last-child{border-bottom:0}
  .srow .sd{font-weight:800;width:52px}.srow .sw{color:var(--muted);font-size:12.5px;width:26px}
  .srow .ss{font-size:13.5px}
  .srow .off{color:#8a5a2b;font-weight:700}
  .today{text-align:center;font-size:14px;font-weight:800;margin-bottom:10px;padding:8px;border-radius:9px;background:#f0f4f8;color:var(--navy)}
  .today.off{background:#fff7ef;color:#8a5a2b}
  .note{background:#fff7ef;border:1px solid #f3d8bd;color:#8a5a2b;font-size:12.5px;border-radius:10px;padding:11px 13px;margin-bottom:14px}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:13px 20px;border-radius:24px;font-weight:700;font-size:14.5px;opacity:0;transition:.3s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:90%;text-align:center}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .hide{display:none}
</style>
</head>
<body>
  <div class="top"><span class="lg">廣</span><b>GPS 定位打卡</b>
    <div class="r" id="topR" style="display:none"><span onclick="changePw()">改密碼</span><span onclick="logout()">登出</span></div>
  </div>

  <div class="box">
    <!-- 登入 -->
    <div id="loginView">
      <div class="note">請用你的員工編號登入。預設密碼 <b>1234</b>，登入後可自行修改。</div>
      <div class="card">
        <label>員工編號</label>
        <input id="inNo" inputmode="numeric" placeholder="例如 007">
        <label>密碼</label>
        <input id="inPw" type="password" placeholder="預設 1234" onkeydown="if(event.key==='Enter')login()">
        <div class="err" id="loginErr"></div>
        <button class="pbtn" onclick="login()">登入</button>
      </div>
    </div>

    <!-- 打卡 -->
    <div id="punchView" class="hide">
      <div class="card">
        <div class="me" id="meTxt"></div>
        <div id="today" class="today"></div>
        <div id="siteWrap" class="hide">
          <div class="siteLabel">打卡案場</div>
          <select id="siteSel"></select>
        </div>
        <div class="status">
          <div class="ring wait" id="ring"><b id="ringTxt">定位中…</b></div>
          <div class="loc" id="locTxt">正在取得您的位置…</div>
          <div class="acc" id="accTxt"></div>
          <a class="maplink" id="mapLink" style="display:none" target="_blank">📍 在地圖查看目前位置</a>
          <span class="relocate" onclick="locate()">↻ 重新定位</span>
        </div>
        <div class="btns">
          <button class="bin" id="btnIn" onclick="punch('in')" disabled>上班打卡</button>
          <button class="bout" id="btnOut" onclick="punch('out')" disabled>下班打卡</button>
        </div>
      </div>
      <div class="card"><h4>📋 本次打卡</h4><div id="recs"><div class="empty">尚未打卡</div></div></div>
      <div class="card"><h4>🗓 我的案場班表（近 14 天）</h4><div id="myShifts"><div class="empty">載入中…</div></div></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
  var API_BASE = "https://guangxiu-punch.coating-wu.workers.dev";
  var ME=null, cur=null, session=[], todaySites=[];

  function $(id){return document.getElementById(id);}
  function mapUrl(la,ln){return "https://www.google.com/maps?q="+la+","+ln;}
  function setBtns(on){$('btnIn').disabled=!on;$('btnOut').disabled=!on;}
  function pad(n){return (n<10?'0':'')+n;}
  function fmtDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  var WD=['日','一','二','三','四','五','六'];

  // ---- 登入 ----
  function login(){
    var no=$('inNo').value.trim(), pw=$('inPw').value;
    if(!no||!pw){$('loginErr').textContent='請輸入編號與密碼';return;}
    $('loginErr').textContent='登入中…';
    fetch(API_BASE+'/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({empno:no,password:pw})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){ ME={empno:d.empno,name:d.name,role:d.role,perm:d.perm,must_change:d.must_change,token:d.token};
        localStorage.setItem('gx_me',JSON.stringify(ME)); enterApp(); }
      else $('loginErr').textContent=d.error||'登入失敗';
    }).catch(function(){$('loginErr').textContent='連線失敗，請檢查網路';});
  }
  function logout(){localStorage.removeItem('gx_me');location.reload();}

  function enterApp(){
    $('loginView').classList.add('hide');
    $('punchView').classList.remove('hide');
    $('topR').style.display='flex';
    $('meTxt').textContent='編號 '+ME.empno+'　'+(ME.name||'')+(ME.role?'（'+ME.role+'）':'');
    locate();
    loadMySchedule();
    if(ME&&ME.must_change){setTimeout(function(){toast('首次登入，請先修改密碼');changePw();},500);}
  }

  // ---- 我的班表（案場）----
  function loadMySchedule(){
    if(!ME) return;
    var t=new Date();t.setHours(0,0,0,0);
    var end=new Date(t);end.setDate(t.getDate()+13);
    fetch(API_BASE+'/api/schedule/list',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({empno:ME.empno,token:ME.token,from:fmtDate(t),to:fmtDate(end)})})
    .then(function(r){return r.json();}).then(function(d){
      var mine=(d.rows||[]).filter(function(r){return r.empno===ME.empno;});
      var todayStr=fmtDate(new Date());
      // 今日：收集案場 / 休假
      todaySites=[]; var todayOff=false;
      mine.forEach(function(r){ if(r.date===todayStr){ if(r.kind==='off')todayOff=true; else if(r.kind==='site')todaySites.push({id:r.site_id,name:r.site_name||('案場#'+r.site_id)}); } });
      todaySites.sort(function(a,b){return 0;});
      var tb=$('today'), sw=$('siteWrap'), sel=$('siteSel');
      if(todayOff){ tb.className='today off'; tb.textContent='今天：休假'; sw.classList.add('hide'); }
      else if(todaySites.length){
        tb.className='today'; tb.textContent='今天案場：'+todaySites.map(function(s){return s.name;}).join('、');
        sw.classList.remove('hide');
        sel.innerHTML=todaySites.map(function(s){return '<option value="'+s.id+'">'+s.name+'</option>';}).join('');
      } else {
        tb.className='today off'; tb.textContent='今天未排案場（仍可打卡，但不綁案場）';
        sw.classList.add('hide'); sel.innerHTML='';
      }
      // 近14天列表
      var el=$('myShifts');
      var byDate={};
      mine.forEach(function(r){ (byDate[r.date]=byDate[r.date]||[]).push(r); });
      var dates=Object.keys(byDate).sort();
      if(!dates.length){el.innerHTML='<div class="empty">近 14 天尚未排班</div>';return;}
      el.innerHTML=dates.map(function(ds){
        var p=ds.split('-');var dt=new Date(+p[0],+p[1]-1,+p[2]);
        var items=byDate[ds].sort(function(a,b){return a.seq-b.seq;});
        var off=items.some(function(x){return x.kind==='off';});
        var txt=off?'<span class="off">休假</span>':items.filter(function(x){return x.kind==='site';}).map(function(x){return x.site_name||('案場#'+x.site_id);}).join(' → ');
        return '<div class="srow"><span class="sd">'+(+p[1])+'/'+(+p[2])+'</span><span class="sw">('+WD[dt.getDay()]+')</span><span class="ss">'+txt+'</span></div>';
      }).join('');
    }).catch(function(){$('myShifts').innerHTML='<div class="empty">班表載入失敗</div>';});
  }

  function changePw(){
    var np=prompt('輸入新密碼（至少 4 碼）');
    if(np===null) return;
    if(np.length<4){toast('密碼至少 4 碼');return;}
    if(prompt('再輸入一次新密碼')!==np){toast('兩次密碼不一致');return;}
    fetch(API_BASE+'/api/change-password',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({empno:ME.empno,token:ME.token,newPassword:np})})
    .then(function(r){return r.json();}).then(function(d){
      if(d.ok){ ME.token=d.token; ME.must_change=0; localStorage.setItem('gx_me',JSON.stringify(ME)); toast('密碼已更新'); }
      else toast(d.error||'更新失敗');
    }).catch(function(){toast('連線失敗');});
  }

  // ---- 定位 ----
  function locate(){
    var ring=$('ring'),rt=$('ringTxt');
    ring.className='ring wait';rt.textContent='定位中…';
    $('locTxt').textContent='正在取得您的位置…';$('accTxt').textContent='';$('mapLink').style.display='none';
    setBtns(false);
    if(!navigator.geolocation){fail('此裝置不支援定位');return;}
    navigator.geolocation.getCurrentPosition(function(p){
      cur={lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy};
      ring.className='ring ok';rt.textContent='定位成功';
      $('locTxt').innerHTML='座標 <b>'+cur.lat.toFixed(5)+', '+cur.lng.toFixed(5)+'</b>';
      $('accTxt').textContent='定位誤差約 ±'+Math.round(cur.acc)+' m';
      var ml=$('mapLink');ml.href=mapUrl(cur.lat,cur.lng);ml.style.display='inline-block';
      setBtns(true);
    },function(e){fail(e.code===1?'您拒絕了定位權限，請到瀏覽器設定開啟':'定位失敗，請到空曠處再試');},
    {enableHighAccuracy:true,timeout:12000,maximumAge:0});
  }
  function fail(m){$('ring').className='ring bad';$('ringTxt').textContent='定位失敗';$('locTxt').textContent=m;setBtns(false);}

  // ---- 打卡 ----
  function punch(type){
    if(!cur){toast('尚未取得定位，請按重新定位');return;}
    var site_id = (todaySites.length && !$('siteWrap').classList.contains('hide')) ? $('siteSel').value : null;
    setBtns(false);
    fetch(API_BASE+'/api/punch',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({empno:ME.empno,token:ME.token,type:type,lat:cur.lat,lng:cur.lng,acc:Math.round(cur.acc),site_id:site_id})})
    .then(function(r){return r.json();}).then(function(d){
      setBtns(true);
      if(d.ok){
        var now=new Date();
        session.unshift({type:type,time:now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit',hour12:false}),lat:cur.lat,lng:cur.lng,site_name:d.site_name||''});
        renderRecs();
        var msg=(type==='in'?'上班':'下班')+'打卡成功';
        if(d.site_name) msg+='・'+d.site_name;
        if(d.dev_m!=null && d.dev_m>300) msg+='（距案場約'+d.dev_m+'m）';
        if(type==='out' && d.early) msg+='（早於下班時間）';
        toast(msg);
      } else if(d.error&&d.error.indexOf('登入')>=0){ toast('登入失效，請重新登入'); setTimeout(logout,1200); }
      else toast('打卡失敗：'+(d.error||''));
    }).catch(function(){setBtns(true);toast('連線失敗，請檢查網路');});
  }
  function renderRecs(){
    var el=$('recs');
    if(!session.length){el.innerHTML='<div class="empty">尚未打卡</div>';return;}
    el.innerHTML=session.map(function(r){
      return '<div class="rec"><span class="t">'+r.time+'</span><span class="ty '+r.type+'">'+(r.type==='in'?'上班':'下班')+'</span>'+
        (r.site_name?'<span class="sn">'+r.site_name+'</span>':'')+
        '<a target="_blank" href="'+mapUrl(r.lat,r.lng)+'">📍地圖</a></div>';
    }).join('');
  }

  var tT;function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(tT);tT=setTimeout(function(){t.classList.remove('show');},2600);}

  (function(){var s=localStorage.getItem('gx_me');if(s){try{ME=JSON.parse(s);enterApp();}catch(e){}}})();
</script>
</body>
</html>
